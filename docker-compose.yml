services:
  db:
    image: postgres:15-alpine
    container_name: videoflix_db
    environment:
      POSTGRES_DB: videoflix
      POSTGRES_USER: videoflix_user
      POSTGRES_PASSWORD: videoflix_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videoflix_user -d videoflix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: videoflix_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: videoflix_mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

  web:
    build: .
    container_name: videoflix_web
    command: >
      sh -c "python manage.py makemigrations users content &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      - DATABASE_URL=postgres://videoflix_user:videoflix_password@db:5432/videoflix
      - REDIS_URL=redis://redis:6379/0

      # Email - Mailhog for Development
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-mailhog}
      - EMAIL_PORT=${EMAIL_PORT:-1025}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-False}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-Videoflix <info@Videoflix.com>}

      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5500}
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - CORS_ALLOWED_ORIGINS=http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started

  worker:
    build: .
    container_name: videoflix_worker
    command: python manage.py rqworker default
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      - DATABASE_URL=postgres://videoflix_user:videoflix_password@db:5432/videoflix
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  static_data:
