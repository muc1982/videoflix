services:
  db:
    image: postgres:15-alpine
    container_name: videoflix_db
    environment:
      POSTGRES_DB: videoflix
      POSTGRES_USER: videoflix_user
      POSTGRES_PASSWORD: videoflix_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videoflix_user -d videoflix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: videoflix_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: .Dockerfile
    container_name: videoflix_web
    command: /app/entrypoint.sh
    env_file:
      - .env
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://videoflix_user:videoflix_password@db:5432/videoflix
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  static_data:
